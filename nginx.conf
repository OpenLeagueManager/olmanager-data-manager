# OLManager Data Manager — Nginx config
# Place at: /etc/nginx/sites-available/olmanager-data-manager
# Then: z   
# Test:  sudo nginx -t
# Apply: sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    # HTTPS — certbot will add these lines automatically:
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

    # HTTP/2 — enable after SSL is set up:
    # http2 on;

    server_name tudominio.com;

    # Security headers
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    # Next.js app — runs on localhost:3000 (or whatever port you configure)
    location / {
        proxy_pass             http://127.0.0.1:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host                 $host;
        proxy_set_header       X-Real-IP            $remote_addr;
        proxy_set_header       X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto    $scheme;
        proxy_set_header       X-Forwarded-Host     $host;
        proxy_set_header       X-Forwarded-Port     $server_port;

        # WebSocket support (Next.js dev mode / Turbopack)
        proxy_set_header       Upgrade              $http_upgrade;
        proxy_set_header       Connection           "upgrade";
        proxy_read_timeout     86400;

        # Don't buffer proxied responses (important for streaming/SSE)
        proxy_buffering        off;

        # Large uploads for potential file uploads
        client_max_body_size   10m;
    }

    # Cache static assets
    location /_next/static {
        proxy_pass             http://127.0.0.1:3000;
        proxy_cache            STATIC;
        proxy_cache_valid      200 1d;
        proxy_cache_use_stale  error timeout invalid_header updating http_500 http_502 http_503 http_504;
        add_header             X-Cache-Status       $upstream_cache_status;
        add_header             Cache-Control        "public, max-age=31536000, immutable";
    }

    # Favicon & robots
    location = /favicon.ico {
        proxy_pass             http://127.0.0.1:3000;
        add_header             Cache-Control        "public, max-age=604800";
    }

    location = /robots.txt {
        proxy_pass             http://127.0.0.1:3000;
        add_header             Cache-Control        "public, max-age=86400";
    }
}

# Define the cache zone (goes in /etc/nginx/nginx.conf inside the http {} block,
# but defined here as a reminder — add this line to your main nginx.conf):
# proxy_cache_path /var/cache/nginx/olmanager levels=1:2 keys_zone=STATIC:10m inactive=7d max_size=100m;
